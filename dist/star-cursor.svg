<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow -->
  <circle
    cx="16"
    cy="16"
    r="10"
    fill="#FFD700"
    opacity="0.25"
    filter="url(#glow)"
  />

  <!-- Star -->
  <path
    d="M16 3
       L19.4 12
       L29 12.5
       L21.5 18.5
       L24.2 28
       L16 22.5
       L7.8 28
       L10.5 18.5
       L3 12.5
       L12.6 12 Z"
    fill="url(#goldGlow)"
    stroke="#FFF8E1"
    stroke-width="1"
    filter="url(#glow)"
  />
</svg>